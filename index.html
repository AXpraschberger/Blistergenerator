<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Automation Express - Bauteil-Planer Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; gap: 20px; padding: 20px; background: #f0f2f5; margin: 0; height: 100vh; overflow: hidden; }
        .controls { width: 340px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; }
        .header { text-align: center; margin-bottom: 15px; }
        .logo { max-width: 140px; height: auto; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        h2 { color: var(--primary); font-size: 1.3em; margin: 0; }
        .info-box { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 0.85em; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .output { margin-top: 15px; padding: 12px; border-radius: 8px; border-left: 5px solid var(--accent); background: #fff3e0; font-size: 0.9em; }
        .warning { margin: 10px 0; padding: 10px; border-radius: 6px; background: #fdeaea; color: var(--danger); font-size: 0.8em; font-weight: bold; border: 1px solid var(--danger); line-height: 1.3; }
        .weight-error { color: var(--danger); border-left-color: var(--danger); background: #fdeaea; }
        .canvas-container { flex-grow: 1; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; padding: 20px; }
        canvas { background: white; border: 1px solid #eee; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="controls">
    <div class="header">
        <img src="logo.png" alt="Automation Express" class="logo" onerror="this.style.display='none'">
        <h2>Automation Express</h2>
        <p style="font-size: 0.75em; color: #666; margin: 2px 0;">Technischer Kalkulator</p>
    </div>

    <div class="info-box">
        <strong>Vorgaben:</strong><br>
        Fläche: 1200 x 800 mm | Max. Last: 180 kg
    </div>
    
    <div class="input-group">
        <label>Form des Bauteils</label>
        <select id="shapeType" onchange="toggleInputs()">
            <option value="rect">Rechteckig</option>
            <option value="circle">Rund (Zylinder)</option>
        </select>
    </div>

    <div id="rectInputs">
        <div class="input-group">
            <label>Grundfläche (B x L) mm</label>
            <div class="row">
                <input type="number" id="partW" value="100" oninput="calculate()"> x 
                <input type="number" id="partL" value="80" oninput="calculate()">
            </div>
        </div>
    </div>

    <div id="circleInputs" class="hidden">
        <div class="input-group">
            <label>Durchmesser (mm)</label>
            <input type="number" id="partD" value="80" oninput="calculate()">
        </div>
    </div>

    <div class="input-group">
        <label>Bauteilhöhe (mm)</label>
        <input type="number" id="partH" value="50" oninput="calculate()">
    </div>

    <div id="tiltWarning" class="warning hidden">
        ⚠ ACHTUNG: Das Bauteil ist sehr schlank (Höhe > 1,5x Breite/Ø). Es besteht Kippgefahr! Der Fall muss durch Automation Express gesondert geprüft werden.
    </div>

    <div class="input-group">
        <label>Material / Dichte</label>
        <select id="material" onchange="calculate()">
            <option value="7.85">Stahl (7.85 g/cm³)</option>
            <option value="2.7">Aluminium (2.7 g/cm³)</option>
            <option value="1.41">Kunststoff POM (1.41 g/cm³)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Abstand zwischen Bauteilen (mm)</label>
        <input type="number" id="gap" value="12" oninput="calculate()">
    </div>

    <div class="output" id="resultText">Berechne...</div>
</div>

<div class="canvas-container" id="cContainer">
    <canvas id="layoutCanvas"></canvas>
</div>

<script>
const FIXED_AW = 1200;
const FIXED_AL = 800;
const MAX_WEIGHT = 180;

function toggleInputs() {
    const shape = document.getElementById('shapeType').value;
    document.getElementById('rectInputs').classList.toggle('hidden', shape !== 'rect');
    document.getElementById('circleInputs').classList.toggle('hidden', shape !== 'circle');
    calculate();
}

function calculate() {
    const canvas = document.getElementById('layoutCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('cContainer');
    
    const gap = parseFloat(document.getElementById('gap').value) || 0;
    const h = parseFloat(document.getElementById('partH').value) || 0;
    const density = parseFloat(document.getElementById('material').value);
    const shape = document.getElementById('shapeType').value;

    let pw, pl, volume;
    if (shape === 'rect') {
        pw = parseFloat(document.getElementById('partW').value) || 0;
        pl = parseFloat(document.getElementById('partL').value) || 0;
        volume = (pw * pl * h) / 1000; 
    } else {
        pw = pl = parseFloat(document.getElementById('partD').value) || 0;
        volume = (Math.PI * Math.pow(pw/2, 2) * h) / 1000;
    }

    // Kipp-Prüfung
    const minSide = Math.min(pw, pl);
    const warningBox = document.getElementById('tiltWarning');
    if (minSide > 0 && h > (minSide * 1.5)) {
        warningBox.classList.remove('hidden');
    } else {
        warningBox.classList.add('hidden');
    }

    // Layout
    const colStep = pw + gap;
    const rowStep = pl + gap;
    const cols = (colStep > 0) ? Math.floor((FIXED_AW + gap) / colStep) : 0;
    const rows = (rowStep > 0) ? Math.floor((FIXED_AL + gap) / rowStep) : 0;
    const total = (cols > 0 && rows > 0) ? cols * rows : 0;

    // Gewicht
    const weightPerPart = (volume * density) / 1000;
    const totalWeight = total * weightPerPart;

    // Skalierung repariert: Verwendet jetzt feste Mindestgröße falls Container noch nicht geladen
    const cW = container.clientWidth || 800;
    const cH = container.clientHeight || 600;
    const scale = Math.min((cW - 40) / FIXED_AW, (cH - 40) / FIXED_AL);
    
    canvas.width = FIXED_AW * scale;
    canvas.height = FIXED_AL * scale;

    const blockWidth = (cols * colStep) - gap;
    const blockHeight = (rows * rowStep) - gap;
    const offsetX = (FIXED_AW - blockWidth) / 2;
    const offsetY = (FIXED_AL - blockHeight) / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Hintergrundfläche zeichnen
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    if (total > 0) {
        ctx.fillStyle = (shape === 'rect') ? "#2c3e50" : "#e67e22";
        ctx.strokeStyle = "rgba(0,0,0,0.1)";

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const x = (offsetX + (c * colStep)) * scale;
                const y = (offsetY + (r * rowStep)) * scale;
                if (shape === 'rect') {
                    ctx.fillRect(x, y, pw * scale, pl * scale);
                    ctx.strokeRect(x, y, pw * scale, pl * scale);
                } else {
                    const r_draw = (pw / 2) * scale;
                    ctx.beginPath();
                    ctx.arc(x + r_draw, y + r_draw, r_draw, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            }
        }
    }

    const resDiv = document.getElementById('resultText');
    resDiv.className = 'output' + (totalWeight > MAX_WEIGHT ? ' weight-error' : '');
    resDiv.innerHTML = `
        <strong>Ergebnis:</strong><br>
        Anzahl: ${total} Stück (${cols}x${rows})<br>
        Gewicht/Teil: ${weightPerPart.toFixed(2)} kg<br>
        <strong>Gesamtgewicht: ${totalWeight.toFixed(1)} kg</strong>
        ${totalWeight > MAX_WEIGHT ? '<br><span style="color:var(--danger)">⚠ ÜBERLAST (Max 180kg!)</span>' : ''}
    `;
}

// Sofort beim Laden ausführen
window.onload = function() {
    toggleInputs();
    setTimeout(calculate, 100); // Sicherheits-Delay für Rendering
};
window.onresize = calculate;
</script>

</body>
</html>
