<script>
// Fixe Werte für die Fläche
const FIXED_AW = 1200;
const FIXED_AL = 800;

function toggleInputs() {
    const shape = document.getElementById('shapeType').value;
    document.getElementById('rectInputs').classList.toggle('hidden', shape !== 'rect');
    document.getElementById('circleInputs').classList.toggle('hidden', shape !== 'circle');
    calculateAndDraw();
}

function calculateAndDraw() {
    const canvas = document.getElementById('layoutCanvas');
    const ctx = canvas.getContext('2d');
    
    const gap = parseFloat(document.getElementById('gap').value) || 0;
    const shape = document.getElementById('shapeType').value;

    let pw, pl;
    if (shape === 'rect') {
        pw = parseFloat(document.getElementById('partW').value) || 0;
        pl = parseFloat(document.getElementById('partL').value) || 0;
    } else {
        pw = pl = parseFloat(document.getElementById('partD').value) || 0;
    }

    // Skalierung für die Anzeige
    const scale = Math.min((window.innerWidth - 450) / FIXED_AW, (window.innerHeight - 80) / FIXED_AL);
    canvas.width = FIXED_AW * scale;
    canvas.height = FIXED_AL * scale;

    const colStep = pw + gap;
    const rowStep = pl + gap;
    
    // Anzahl berechnen
    const cols = Math.floor((FIXED_AW + gap) / colStep);
    const rows = Math.floor((FIXED_AL + gap) / rowStep);
    const total = (cols > 0 && rows > 0) ? cols * rows : 0;

    // --- NEU: Zentrierung berechnen ---
    // Wir berechnen die Breite/Höhe des gesamten Bauteil-Blocks
    const blockWidth = (cols * colStep) - gap;
    const blockHeight = (rows * rowStep) - gap;

    // Der Offset ist die Hälfte des verbleibenden Platzes
    const offsetX = (FIXED_AW - blockWidth) / 2;
    const offsetY = (FIXED_AL - blockHeight) / 2;
    // ----------------------------------

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Hintergrund (die 1200x800 Fläche)
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Bauteile zeichnen
    ctx.fillStyle = (shape === 'rect') ? "#2c3e50" : "#e67e22";
    ctx.strokeStyle = "rgba(0,0,0,0.1)";

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            // offsetX/Y werden hier zur Position hinzugefügt
            const x = (offsetX + (c * colStep)) * scale;
            const y = (offsetY + (r * rowStep)) * scale;

            if (shape === 'rect') {
                ctx.fillRect(x, y, pw * scale, pl * scale);
                ctx.strokeRect(x, y, pw * scale, pl * scale);
            } else {
                const radius = (pw / 2) * scale;
                ctx.beginPath();
                ctx.arc(x + radius, y + radius, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }
    }

    document.getElementById('resultText').innerHTML = 
        `<strong>Automation Express Ergebnis:</strong><br>` +
        `Raster: ${cols} x ${rows}<br>` +
        `Gesamt: <span style="font-size: 1.3em; color: #e67e22;">${total} Stück</span>`;
}

toggleInputs();
</script>
