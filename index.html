<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Automation Express - Bauteil-Planer Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; gap: 30px; padding: 30px; background: #f0f2f5; margin: 0; height: 100vh; box-sizing: border-box; }
        .controls { width: 340px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; overflow-y: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { max-width: 150px; height: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        h2 { color: var(--primary); font-size: 1.4em; margin: 0; }
        .info-box { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 0.85em; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .row { display: flex; gap: 8px; align-items: center; }
        .output { margin-top: 20px; padding: 15px; border-radius: 8px; border-left: 5px solid var(--accent); background: #fff3e0; }
        .warning { margin: 10px 0; padding: 12px; border-radius: 6px; background: #fdeaea; color: var(--danger); font-size: 0.85em; font-weight: bold; border: 1px solid var(--danger); line-height: 1.4; }
        .weight-error { color: var(--danger); border-left-color: var(--danger); background: #fdeaea; }
        .canvas-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        canvas { background: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="controls">
    <div class="header">
        <img src="logo.png" alt="Automation Express" class="logo" onerror="this.style.display='none'">
        <h2>Automation Express</h2>
        <p style="font-size: 0.8em; color: #666;">Technischer Kalkulator</p>
    </div>

    <div class="info-box">
        <strong>Vorgaben:</strong><br>
        Fläche: 1200 x 800 mm | Max. Last: 180 kg
    </div>
    
    <div class="input-group">
        <label>Form des Bauteils</label>
        <select id="shapeType" onchange="toggleInputs()">
            <option value="rect">Rechteckig</option>
            <option value="circle">Rund (Zylinder)</option>
        </select>
    </div>

    <div id="rectInputs">
        <div class="input-group">
            <label>Grundfläche (B x L) mm</label>
            <div class="row">
                <input type="number" id="partW" value="100" oninput="calculate()"> x 
                <input type="number" id="partL" value="80" oninput="calculate()">
            </div>
        </div>
    </div>

    <div id="circleInputs" class="hidden">
        <div class="input-group">
            <label>Durchmesser (mm)</label>
            <input type="number" id="partD" value="80" oninput="calculate()">
        </div>
    </div>

    <div class="input-group">
        <label>Bauteilhöhe (mm)</label>
        <input type="number" id="partH" value="150" oninput="calculate()">
    </div>

    <div id="tiltWarning" class="warning hidden">
        ⚠ ACHTUNG: Das Bauteil ist sehr schlank (Höhe > 1,5x Breite/Ø). Es besteht Kippgefahr! Der Fall muss durch Automation Express gesondert geprüft werden.
    </div>

    <div class="input-group">
        <label>Material / Dichte</label>
        <select id="material" onchange="calculate()">
            <option value="7.85">Stahl (7.85 g/cm³)</option>
            <option value="2.7">Aluminium (2.7 g/cm³)</option>
            <option value="1.41">Kunststoff POM (1.41 g/cm³)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Abstand zwischen Bauteilen (mm)</label>
        <input type="number" id="gap" value="12" oninput="calculate()">
    </div>

    <div class="output" id="resultText">Berechne...</div>
</div>

<div class="canvas-container">
    <canvas id="layoutCanvas"></canvas>
</div>

<script>
const FIXED_AW = 1200;
const FIXED_AL = 800;
const MAX_WEIGHT = 180;

function toggleInputs() {
    const shape = document.getElementById('shapeType').value;
    document.getElementById('rectInputs').classList.toggle('hidden', shape !== 'rect');
    document.getElementById('circleInputs').classList.toggle('hidden', shape !== 'circle');
    calculate();
}

function calculate() {
    const canvas = document.getElementById('layoutCanvas');
    const ctx = canvas.getContext('2d');
    
    const gap = parseFloat(document.getElementById('gap').value) || 0;
    const h = parseFloat(document.getElementById('partH').value) || 0;
    const density = parseFloat(document.getElementById('material').value);
    const shape = document.getElementById('shapeType').value;

    let pw, pl, volume;
    if (shape === 'rect') {
        pw = parseFloat(document.getElementById('partW').value) || 0;
        pl = parseFloat(document.getElementById('partL').value) || 0;
        volume = (pw * pl * h) / 1000; 
    } else {
        pw = pl = parseFloat(document.getElementById('partD').value) || 0;
        volume = (Math.PI * Math.pow(pw/2, 2) * h) / 1000;
    }

    // Kipp-Prüfung
    const minSide = Math.min(pw, pl);
    const warningBox = document.getElementById('tiltWarning');
    if (minSide > 0 && h > (minSide * 1.5)) {
        warningBox.classList.remove('hidden');
    } else {
        warningBox.classList.add('hidden');
    }

    // Layout-Berechnung
    const colStep = pw + gap;
    const rowStep = pl + gap;
    const cols = Math.max(0, Math.floor((FIXED_AW + gap) / colStep));
    const rows = Math.max(0, Math.floor((FIXED_AL + gap) / rowStep));
    const total = cols * rows;

    // Gewicht
    const weightPerPart = (volume * density) / 1000;
    const totalWeight = total * weightPerPart;

    // Canvas Skalierung & Zeichnen
    const container = document.querySelector('.canvas-container');
    const scale = Math.min((container.clientWidth - 40) / FIXED_AW, (container.clientHeight - 40) / FIXED_AL, 1);
    
    canvas.width = FIXED_AW * scale;
    canvas.height = FIXED_AL * scale;

    const blockWidth = (cols * colStep) - gap;
    const blockHeight = (rows * rowStep) - gap;
    const offsetX = (FIXED_AW - blockWidth) / 2;
    const offsetY = (FIXED_AL - blockHeight) / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Hintergrundrahmen (Fläche)
    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = 1;
    ctx.strokeRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = (shape === 'rect') ? "#2c3e50" : "#e67e22";
    ctx.strokeStyle = "rgba(0,0,0,0.1)";

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = (offsetX + (c * colStep)) * scale;
            const y = (offsetY + (r * rowStep)) * scale;
            if (shape === 'rect') {
                ctx.fillRect(x, y, pw * scale, pl * scale);
                ctx.strokeRect(x, y, pw * scale, pl * scale);
            } else {
                const r_draw = (pw / 2) * scale;
