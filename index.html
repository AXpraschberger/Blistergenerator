<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Automation Express - Bauteil-Planer Pro</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; gap: 20px; padding: 20px; background: #f0f2f5; margin: 0; height: 100vh; overflow: hidden; }
        .controls { width: 340px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; overflow-y: auto; display: flex; flex-direction: column; z-index: 10; }
        .header { text-align: center; margin-bottom: 15px; }
        .logo { max-width: 140px; height: auto; margin-bottom: 5px; display: block; margin-left: auto; margin-right: auto; }
        h2 { color: var(--primary); font-size: 1.3em; margin: 0; }
        .info-box { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 0.85em; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .row { display: flex; gap: 8px; align-items: center; }
        .output { margin-top: 15px; padding: 12px; border-radius: 8px; border-left: 5px solid var(--accent); background: #fff3e0; font-size: 0.9em; min-height: 60px; }
        .warning { margin: 10px 0; padding: 10px; border-radius: 6px; background: #fdeaea; color: var(--danger); font-size: 0.8em; font-weight: bold; border: 1px solid var(--danger); line-height: 1.3; }
        .weight-error { color: var(--danger); border-left-color: var(--danger); background: #fdeaea; }
        .canvas-container { flex-grow: 1; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; min-width: 300px; }
        canvas { background: white; border: 1px solid #eee; max-width: 100%; max-height: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="controls">
    <div class="header">
        <img src="logo.png" alt="Automation Express" class="logo" onerror="this.style.display='none'">
        <h2>Automation Express</h2>
        <p style="font-size: 0.75em; color: #666; margin: 2px 0;">Technischer Kalkulator</p>
    </div>

    <div class="info-box">
        <strong>Vorgaben:</strong><br>
        Fläche: 1200 x 800 mm | Max. Last: 180 kg
    </div>
    
    <div class="input-group">
        <label>Form des Bauteils</label>
        <select id="shapeType" onchange="toggleInputs()">
            <option value="rect">Rechteckig</option>
            <option value="circle">Rund (Zylinder)</option>
        </select>
    </div>

    <div id="rectInputs">
        <div class="input-group">
            <label>Grundfläche (B x L) mm</label>
            <div class="row">
                <input type="number" id="partW" value="100" oninput="calculate()"> x 
                <input type="number" id="partL" value="80" oninput="calculate()">
            </div>
        </div>
    </div>

    <div id="circleInputs" class="hidden">
        <div class="input-group">
            <label>Durchmesser (mm)</label>
            <input type="number" id="partD" value="80" oninput="calculate()">
        </div>
    </div>

    <div class="input-group">
        <label>Bauteilhöhe (mm)</label>
        <input type="number" id="partH" value="50" oninput="calculate()">
    </div>

    <div id="tiltWarning" class="warning hidden">
        ⚠ ACHTUNG: Das Bauteil ist sehr schlank (Höhe > 1,5x Breite/Ø). Es besteht Kippgefahr! Der Fall muss durch Automation Express gesondert geprüft werden.
    </div>

    <div class="input-group">
        <label>Material / Dichte</label>
        <select id="material" onchange="calculate()">
            <option value="7.85">Stahl (7.85 g/cm³)</option>
            <option value="2.7">Aluminium (2.7 g/cm³)</option>
            <option value="1.41">Kunststoff POM (1.41 g/cm³)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Abstand zwischen Bauteilen (mm)</label>
        <input type="number" id="gap" value="12" oninput="calculate()">
    </div>

    <div class="output" id="resultText">Initialisierung...</div>
</div>

<div class="canvas-container" id="cContainer">
    <canvas id="layoutCanvas"></canvas>
</div>

<script>

    const shape = document.getElementById('shapeType').value;
    document.getElementById('rectInputs').classList.toggle('hidden', shape !== 'rect');
    document.getElementById('circleInputs').classList.toggle('hidden', shape !== 'circle');
    calculate();
}

    if (minSide > 0 && h > (minSide * 1.5)) {
